name: Test Count Sync

on:
  pull_request:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  check-test-count-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Verify docs test counts are synced
        run: python scripts/sync_test_counts.py --check
