name: Tests

on:
  pull_request:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run test suite
        run: pytest tests/ -q
